ekf_filter_node:
    ros__parameters:
        frequency: 20.0
        sensor_timeout: 0.1
        two_d_mode: true
        publish_tf: true
        map_frame: map
        odom_frame: odom
        base_link_frame: base_footprint
        world_frame: odom

        
        odom0: /odom
        odom0_config: [false, false, false,
                       false, false, false,
                       true,  true,  false,
                       false, false, true,
                       false, false, false]
        odom0_differential: false
        odom0_relative: false
        odom0_queue_size: 30

        odom1: /vo
        odom1_config: [true,  true,  false,
                       false, false, true,
                       false, false, false,
                       false, false, false,
                       false, false, false]
        odom1_differential: false
        odom1_relative: false
        odom1_queue_size: 10


        print_diagnostics: true
        debug: false

